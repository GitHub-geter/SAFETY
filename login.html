<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- LOGIN SECTION -->
    <div class="login-section card">
        <h1>Login</h1>
        <form>
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Enter your email (sovn.com)">

            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Password (12345)">

            <label for="login-role">Role</label>
            <select id="login-role">
                <option value="user">USER</option>
                <option value="staff">STAFF</option>
            </select>

            <button type="submit" onclick="handleLogin()">Login</button>
        </form>

        <p>New User? <a href="#" class="go-register">Register</a></p>
        <p><a href="#" class="go-emergency">Emergency Login</a></p>
    </div>


    <!-- REGISTER SECTION -->
    <div class="register-section card">
        <h1>Register</h1>
        <form>
            <label for="register-name">Name</label>
            <input type="text" id="register-name" placeholder="Enter your name">

            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="Enter your email">

            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Password">

            <label for="register-confirm">Confirm Password</label>
            <input type="password" id="register-confirm" placeholder="Confirm password">

            <label for="register-role">Role</label>
            <select id="register-role">
                <option value="user">USER</option>
                <option value="staff">STAFF</option>
            </select>

            <button type="submit" onclick="handleRegister()">Register</button>
        </form>

        <p>Already have an account? <a href="#" class="go-login">Login</a></p>
    </div>


    <!-- EMERGENCY SECTION -->
    <div class="emergency-section card">
        <h1>Emergency Login</h1>

        <form>
            <label for="room-number">Room Number</label>
            <input type="text" id="room-number" placeholder="Enter room number">

            <button type="submit">Enter</button>
        </form>

        <p><a href="#" class="go-login">Back to Login</a></p>
    </div>
    <script src="login.js"></script>
</body>
</html>
