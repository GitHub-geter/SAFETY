<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Safety</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 1. Reset and Sticky Footer Logic */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: #f8f9fa;
        }

        /* The wrapper grows to fill space, pushing footer down */
        .content-wrapper {
            flex: 1 0 auto;
            display: flex;
            flex-direction: row;
        }

        /* 2. Sidebar Desktop Styling */
        @media (min-width: 992px) {
            .sidebar-fixed {
                position: sticky;
                top: 72px; /* Navbar height */
                height: calc(100vh - 72px);
                width: 280px;
                min-width: 280px;
                overflow-y: auto;
                background-color: white;
            }
        }

        /* 3. Main Content Area */
        .main-content {
            flex: 1;
            min-width: 0; /* Prevents layout breaking on small screens */
        }

        footer {
            flex-shrink: 0; /* Prevents footer from squishing */
            background-color: white;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white border-bottom p-3 sticky-top">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-dark me-3 d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="assets/safety_2.png" alt="Logo" width="30" height="24" class="me-2">
                    <span class="fw-bold text-dark">Safety</span>
                </a>
            </div>
            <button type="button" class="btn btn-outline-danger">Log out</button>
        </div>
    </nav>

    <div class="content-wrapper">
        
        <aside class="sidebar-fixed border-end p-3 d-none d-lg-flex flex-column">
            <span class="fs-4 fw-bold mb-3">Dashboard</span>
            <hr>
            <div class="card mb-3">
                <div class="card-header fw-bold small">NOTIFICATIONS</div>
                <div class="card-body p-2" style="height: 120px; overflow-y: auto;">
                    <p class="text-muted small">No new updates.</p>
                </div>
            </div>
            <div class="card flex-grow-1">
                <div class="card-header bg-danger text-white fw-bold small">LIVE ALERTS</div>
                <div class="card-body p-2" style="overflow-y: auto;">
                    <div class="alert alert-warning py-1 px-2 mb-2 small">
                        <strong>Fire:</strong> Room 302
                    </div>
                </div>
            </div>
        </aside>

        <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileSidebar">
            <div class="offcanvas-header border-bottom">
                <h5 class="offcanvas-title fw-bold">Menu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <span class="fs-4 fw-bold">Dashboard</span>
                <hr>
                <div class="card mb-3">
                    <div class="card-header fw-bold small">NOTIFICATIONS</div>
                    <div class="card-body p-2"><p class="text-muted small">No new updates.</p></div>
                </div>
                <div class="card">
                    <div class="card-header bg-danger text-white fw-bold small">LIVE ALERTS</div>
                    <div class="card-body p-2">
                        <div class="alert alert-warning py-1 px-2 small"><strong>Fire:</strong> Room 302</div>
                    </div>
                </div>
            </div>
        </div>

        <main class="main-content p-3 p-md-4">
            
            <div class="row g-3 mb-4">
                <div class="col-12 col-md-4">
                    <div class="card text-center p-3 shadow-sm border-0">
                        <h6 class="text-muted">Lives Saved</h6>
                        <h2 class="text-success fw-bold">1,240</h2>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="card text-center p-3 shadow-sm border-0">
                        <h6 class="text-muted">Hospitality Type</h6>
                        <h2 class="text-primary fw-bold">Medical</h2>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="card text-center p-3 shadow-sm border-0">
                        <h6 class="text-muted">Active Users</h6>
                        <h2 class="text-warning fw-bold">85</h2>
                    </div>
                </div>
            </div>

            <div class="bg-white border rounded p-3 shadow-sm" style="min-height: 400px;">
                <p class="text-muted text-center mt-5">Main Section: Map & Tabs placeholder</p>
                </div>
        </main>
    </div>

    <footer class="border-top text-center p-4">
        <div class="container">
            <section class="mb-3">
                <a class="btn btn-outline-dark btn-sm m-1" href="#!"><i class="fab fa-facebook-f"></i></a>
                <a class="btn btn-outline-dark btn-sm m-1" href="#!"><i class="fab fa-twitter"></i></a>
                <a class="btn btn-outline-dark btn-sm m-1" href="#!"><i class="fab fa-instagram"></i></a>
                <a class="btn btn-outline-dark btn-sm m-1" href="#!"><i class="fab fa-linkedin-in"></i></a>
                <a class="btn btn-outline-dark btn-sm m-1" href="#!"><i class="fab fa-github"></i></a>
            </section>
            <div class="text-muted small">
                © 2026 Copyright: <a class="text-decoration-none text-dark fw-bold" href="#">safety.com</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
